<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futures Dashboard – Barchart Live</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --blue: #58a6ff;
      --accent: #1f6feb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header h1 span { color: var(--blue); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #last-updated { font-size: 0.78rem; color: var(--muted); }
    #refresh-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #refresh-btn:hover { opacity: 0.85; }
    .live-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Layout ── */
    main { padding: 24px 28px; max-width: 1600px; margin: 0 auto; }
    section { margin-bottom: 32px; }
    h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Quote Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }
    .card:hover { border-color: var(--blue); transform: translateY(-2px); }
    .card.selected { border-color: var(--accent); background: #1a2332; }
    .card-symbol {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-name {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-price {
      font-size: 1.7rem;
      font-weight: 700;
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }
    .card-change {
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 2px;
    }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .card-meta {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .card-meta span b { color: var(--text); }
    .expiry-badge {
      display: inline-block;
      margin-top: 8px;
      background: #21262d;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .expiry-badge.urgent { border-color: var(--red); color: var(--red); }
    .expiry-badge.soon { border-color: #e3b341; color: #e3b341; }
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,17,23,0.6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Chart Panel ── */
    .chart-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .chart-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chart-title { font-size: 1rem; font-weight: 600; }
    .chart-type-btns button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.78rem;
      margin-left: 6px;
      transition: all 0.15s;
    }
    .chart-type-btns button.active,
    .chart-type-btns button:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    #main-chart { width: 100%; height: 420px; }

    /* ── Summary Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    thead th {
      background: #1c2128;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    tbody tr { border-top: 1px solid var(--border); }
    tbody tr:hover { background: #1a2332; }
    tbody td { padding: 10px 14px; font-variant-numeric: tabular-nums; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }

    /* ── Expiry Timers ── */
    .expiry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .expiry-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }
    .expiry-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .expiry-card-sym { font-weight: 700; font-size: 0.95rem; }
    .expiry-card-date { font-size: 0.75rem; color: var(--muted); }
    .expiry-progress-bg {
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }
    .expiry-progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .expiry-days {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .expiry-days b { font-size: 1rem; font-weight: 700; color: var(--text); }

    /* ── Multi-chart ── */
    .multi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .mini-chart-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .mini-chart-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 8px; color: var(--muted); }
    .mini-chart { height: 200px; }
  </style>
</head>
<body>

<header>
  <h1>Futures <span>Dashboard</span> — Barchart Live</h1>
  <div class="header-right">
    <div class="live-dot" title="Auto-refresh every 60s"></div>
    <span id="last-updated">Loading…</span>
    <button id="refresh-btn" onclick="refreshAll()">⟳ Refresh</button>
  </div>
</header>

<main>

  <!-- Quote Cards -->
  <section>
    <h2>Live Quotes</h2>
    <div class="cards-grid" id="cards-grid"></div>
  </section>

  <!-- Main Chart -->
  <section>
    <div class="chart-panel">
      <div class="chart-controls">
        <span class="chart-title" id="chart-title">Select a contract to view chart</span>
        <div class="chart-type-btns">
          <button id="btn-line" class="active" onclick="setChartType('line')">Line</button>
          <button id="btn-candle" onclick="setChartType('candle')">Candlestick</button>
          <button id="btn-bar" onclick="setChartType('ohlc')">OHLC</button>
          <button id="btn-vol" onclick="setChartType('volume')">Volume</button>
        </div>
      </div>
      <div id="main-chart"></div>
    </div>
  </section>

  <!-- Expiry Countdown -->
  <section>
    <h2>Expiry Countdown</h2>
    <div class="expiry-grid" id="expiry-grid"></div>
  </section>

  <!-- Summary Table -->
  <section>
    <h2>Contract Summary</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Name</th>
            <th>Last</th>
            <th>Change</th>
            <th>% Change</th>
            <th>52W High</th>
            <th>52W Low</th>
            <th>Support</th>
            <th>Resistance</th>
            <th>Margin</th>
            <th>Expiry</th>
            <th>DTE</th>
          </tr>
        </thead>
        <tbody id="summary-table"></tbody>
      </table>
    </div>
  </section>

  <!-- Mini Charts Grid -->
  <section>
    <h2>All Contracts – Price History</h2>
    <div class="multi-grid" id="multi-grid"></div>
  </section>

</main>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const CONTRACTS = {{ contracts | tojson }};
let quotes = {};
let histories = {};
let selectedSymbol = CONTRACTS[0];
let chartType = "line";
let autoRefreshTimer;

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  buildCards();
  buildExpiryGrid();
  buildMiniGrid();
  refreshAll();
  scheduleAutoRefresh();
});

function scheduleAutoRefresh() {
  clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(refreshAll, 60000);
}

// ─── Data Fetching ────────────────────────────────────────────────────────────
async function refreshAll() {
  document.getElementById("last-updated").textContent = "Updating…";
  setCardLoading(true);

  try {
    const [quotesResp, ...histResps] = await Promise.all([
      fetch("/api/quotes/all").then(r => r.json()),
      ...CONTRACTS.map(sym => fetch(`/api/history/${sym}`).then(r => r.json()).then(d => ({ sym, d }))),
    ]);

    quotes = quotesResp;
    histResps.forEach(({ sym, d }) => { histories[sym] = d; });

    updateCards();
    updateTable();
    updateExpiryGrid();
    updateMainChart();
    updateMiniCharts();

    const now = new Date();
    document.getElementById("last-updated").textContent =
      `Updated ${now.toLocaleTimeString()}`;
  } catch (e) {
    console.error(e);
    document.getElementById("last-updated").textContent = "Error – retrying…";
  } finally {
    setCardLoading(false);
  }
}

// ─── Cards ────────────────────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById("cards-grid");
  grid.innerHTML = CONTRACTS.map(sym => `
    <div class="card" id="card-${sym}" onclick="selectSymbol('${sym}')">
      <div class="loading-overlay" id="loading-${sym}"><div class="spinner"></div></div>
      <div class="card-symbol">${sym}</div>
      <div class="card-name" id="cname-${sym}">–</div>
      <div class="card-price" id="cprice-${sym}">–</div>
      <div class="card-change" id="cchange-${sym}">–</div>
      <div class="card-meta" id="cmeta-${sym}"></div>
      <span class="expiry-badge" id="cbadge-${sym}">–</span>
    </div>
  `).join("");
  selectSymbol(selectedSymbol);
}

function setCardLoading(state) {
  CONTRACTS.forEach(sym => {
    const el = document.getElementById(`loading-${sym}`);
    if (el) el.style.display = state ? "flex" : "none";
  });
}

function updateCards() {
  CONTRACTS.forEach(sym => {
    const q = quotes[sym] || {};
    const last = q.last ?? "–";
    const change = q.change;
    const pct = q.pct_change;
    const isUp = change >= 0;
    const dte = q.days_to_expiry ?? -1;

    document.getElementById(`cname-${sym}`).textContent = q.name || sym;
    document.getElementById(`cprice-${sym}`).textContent =
      last !== "–" ? fmtNum(last) : "–";

    const changeEl = document.getElementById(`cchange-${sym}`);
    if (change != null) {
      const sign = isUp ? "+" : "";
      const pctStr = pct != null ? ` (${sign}${pct.toFixed(2)}%)` : "";
      changeEl.textContent = `${sign}${fmtNum(change)}${pctStr}`;
      changeEl.className = `card-change ${isUp ? "up" : "down"}`;
    }

    const meta = document.getElementById(`cmeta-${sym}`);
    meta.innerHTML = [
      q.high52 != null ? `<span>52W H <b>${fmtNum(q.high52)}</b></span>` : "",
      q.low52 != null ? `<span>52W L <b>${fmtNum(q.low52)}</b></span>` : "",
      q.support1 != null ? `<span>S1 <b>${fmtNum(q.support1)}</b></span>` : "",
      q.resistance1 != null ? `<span>R1 <b>${fmtNum(q.resistance1)}</b></span>` : "",
    ].join("");

    const badge = document.getElementById(`cbadge-${sym}`);
    badge.textContent = dte >= 0 ? `Expires in ${dte}d` : `Exp: ${q.expiry || "–"}`;
    badge.className = `expiry-badge ${dte >= 0 && dte <= 30 ? "urgent" : dte <= 90 ? "soon" : ""}`;
  });
}

function selectSymbol(sym) {
  selectedSymbol = sym;
  CONTRACTS.forEach(s => {
    document.getElementById(`card-${s}`)?.classList.toggle("selected", s === sym);
  });
  document.getElementById("chart-title").textContent =
    (quotes[sym]?.name || sym) + " – Price History";
  updateMainChart();
}

// ─── Chart ────────────────────────────────────────────────────────────────────
function setChartType(type) {
  chartType = type;
  ["line","candle","bar","vol"].forEach(t => {
    document.getElementById(`btn-${t}`)?.classList.remove("active");
  });
  const map = { line:"btn-line", candle:"btn-candle", ohlc:"btn-bar", volume:"btn-vol" };
  document.getElementById(map[type])?.classList.add("active");
  updateMainChart();
}

function updateMainChart() {
  const hist = histories[selectedSymbol];
  if (!hist || hist.length === 0) return;

  const dates = hist.map(r => r.date);
  const closes = hist.map(r => r.close);
  const opens = hist.map(r => r.open);
  const highs = hist.map(r => r.high);
  const lows = hist.map(r => r.low);
  const vols = hist.map(r => r.volume);
  const q = quotes[selectedSymbol] || {};
  const color = q.color || "#2196F3";

  const layout = {
    paper_bgcolor: "#161b22",
    plot_bgcolor: "#161b22",
    font: { color: "#e6edf3", family: "inherit" },
    margin: { l: 55, r: 20, t: 10, b: 50 },
    xaxis: {
      gridcolor: "#21262d", linecolor: "#30363d",
      tickfont: { size: 11 },
      rangeslider: { visible: false },
    },
    yaxis: {
      gridcolor: "#21262d", linecolor: "#30363d",
      tickfont: { size: 11 }, side: "right",
    },
    hovermode: "x unified",
    showlegend: false,
  };

  let traces = [];
  if (chartType === "line") {
    traces = [{
      type: "scatter", mode: "lines",
      x: dates, y: closes,
      line: { color, width: 2 },
      fill: "tozeroy",
      fillcolor: hexToRgba(color, 0.08),
      name: "Close",
    }];
  } else if (chartType === "candle") {
    traces = [{
      type: "candlestick",
      x: dates, open: opens, high: highs, low: lows, close: closes,
      increasing: { line: { color: "#3fb950" }, fillcolor: "#3fb950" },
      decreasing: { line: { color: "#f85149" }, fillcolor: "#f85149" },
    }];
  } else if (chartType === "ohlc") {
    traces = [{
      type: "ohlc",
      x: dates, open: opens, high: highs, low: lows, close: closes,
      increasing: { line: { color: "#3fb950" } },
      decreasing: { line: { color: "#f85149" } },
    }];
  } else if (chartType === "volume") {
    const barColors = closes.map((c, i) =>
      i === 0 ? "#3fb950" : (c >= closes[i - 1] ? "#3fb950" : "#f85149")
    );
    traces = [
      {
        type: "scatter", mode: "lines",
        x: dates, y: closes,
        line: { color, width: 1.5 },
        yaxis: "y2", name: "Price",
      },
      {
        type: "bar",
        x: dates, y: vols,
        marker: { color: barColors, opacity: 0.6 },
        name: "Volume",
      },
    ];
    layout.yaxis.title = "Volume";
    layout.yaxis2 = {
      overlaying: "y", side: "right",
      gridcolor: "#21262d", showgrid: false,
      tickfont: { size: 11 },
    };
  }

  // Support / Resistance lines
  if (q.support1 && chartType !== "volume") {
    traces.push({
      type: "scatter", mode: "lines",
      x: [dates[0], dates[dates.length - 1]],
      y: [q.support1, q.support1],
      line: { color: "#3fb950", width: 1, dash: "dot" },
      name: "Support",
    });
  }
  if (q.resistance1 && chartType !== "volume") {
    traces.push({
      type: "scatter", mode: "lines",
      x: [dates[0], dates[dates.length - 1]],
      y: [q.resistance1, q.resistance1],
      line: { color: "#f85149", width: 1, dash: "dot" },
      name: "Resistance",
    });
  }

  Plotly.react("main-chart", traces, layout, { responsive: true, displayModeBar: false });
}

// ─── Expiry Grid ──────────────────────────────────────────────────────────────
function buildExpiryGrid() {
  const grid = document.getElementById("expiry-grid");
  grid.innerHTML = CONTRACTS.map(sym => `
    <div class="expiry-card">
      <div class="expiry-card-header">
        <span class="expiry-card-sym" id="ex-sym-${sym}">${sym}</span>
        <span class="expiry-card-date" id="ex-date-${sym}">–</span>
      </div>
      <div class="expiry-progress-bg">
        <div class="expiry-progress-fill" id="ex-fill-${sym}" style="width:0%"></div>
      </div>
      <div class="expiry-days">
        <span><b id="ex-dte-${sym}">–</b> days remaining</span>
        <span id="ex-pct-${sym}">–</span>
      </div>
    </div>
  `).join("");
}

function updateExpiryGrid() {
  CONTRACTS.forEach(sym => {
    const q = quotes[sym] || {};
    const dte = q.days_to_expiry ?? -1;
    const totalDays = 365;
    const pct = dte >= 0 ? Math.max(0, Math.min(100, (dte / totalDays) * 100)) : 0;

    document.getElementById(`ex-sym-${sym}`).textContent = q.name || sym;
    document.getElementById(`ex-date-${sym}`).textContent =
      q.expiry ? `Expires ${q.expiry}` : "–";
    document.getElementById(`ex-dte-${sym}`).textContent = dte >= 0 ? dte : "–";
    document.getElementById(`ex-pct-${sym}`).textContent =
      dte >= 0 ? `${pct.toFixed(1)}% of year` : "";

    const fill = document.getElementById(`ex-fill-${sym}`);
    fill.style.width = `${pct}%`;
    fill.style.background =
      dte <= 30 ? "#f85149" : dte <= 90 ? "#e3b341" : "#3fb950";
  });
}

// ─── Summary Table ────────────────────────────────────────────────────────────
function updateTable() {
  const tbody = document.getElementById("summary-table");
  tbody.innerHTML = CONTRACTS.map(sym => {
    const q = quotes[sym] || {};
    const change = q.change;
    const isUp = change >= 0;
    const color = q.color || "#2196F3";
    const dte = q.days_to_expiry ?? "–";
    const dteColor = dte <= 30 ? "#f85149" : dte <= 90 ? "#e3b341" : "#3fb950";
    return `
      <tr onclick="selectSymbol('${sym}')" style="cursor:pointer">
        <td>
          <span class="dot" style="background:${color}"></span>
          <b>${sym}</b>
        </td>
        <td style="color:var(--muted)">${q.name || "–"}</td>
        <td><b>${q.last != null ? fmtNum(q.last) : "–"}</b></td>
        <td class="${change != null ? (isUp ? "up" : "down") : ""}">
          ${change != null ? (isUp ? "+" : "") + fmtNum(change) : "–"}
        </td>
        <td class="${change != null ? (isUp ? "up" : "down") : ""}">
          ${q.pct_change != null ? (isUp ? "+" : "") + q.pct_change.toFixed(2) + "%" : "–"}
        </td>
        <td>${q.high52 != null ? fmtNum(q.high52) : "–"}</td>
        <td>${q.low52 != null ? fmtNum(q.low52) : "–"}</td>
        <td style="color:var(--green)">${q.support1 != null ? fmtNum(q.support1) : "–"}</td>
        <td style="color:var(--red)">${q.resistance1 != null ? fmtNum(q.resistance1) : "–"}</td>
        <td>${q.margin != null ? "$" + q.margin.toLocaleString() : "–"}</td>
        <td style="color:var(--muted)">${q.expiry || "–"}</td>
        <td style="color:${dteColor};font-weight:700">${dte}</td>
      </tr>
    `;
  }).join("");
}

// ─── Mini Charts ──────────────────────────────────────────────────────────────
function buildMiniGrid() {
  const grid = document.getElementById("multi-grid");
  grid.innerHTML = CONTRACTS.map(sym => `
    <div class="mini-chart-panel">
      <div class="mini-chart-title">${sym}</div>
      <div class="mini-chart" id="mini-${sym}"></div>
    </div>
  `).join("");
}

function updateMiniCharts() {
  CONTRACTS.forEach(sym => {
    const hist = histories[sym];
    if (!hist || hist.length === 0) return;
    const q = quotes[sym] || {};
    const color = q.color || "#2196F3";
    const dates = hist.map(r => r.date);
    const closes = hist.map(r => r.close);
    const isUp = closes[closes.length - 1] >= closes[0];

    const layout = {
      paper_bgcolor: "#161b22",
      plot_bgcolor: "#161b22",
      font: { color: "#8b949e", size: 9 },
      margin: { l: 40, r: 10, t: 4, b: 30 },
      xaxis: { gridcolor: "#21262d", linecolor: "#30363d", tickfont: { size: 9 } },
      yaxis: { gridcolor: "#21262d", linecolor: "#30363d", tickfont: { size: 9 }, side: "right" },
      showlegend: false,
      hovermode: "x",
    };

    Plotly.react(`mini-${sym}`, [{
      type: "scatter", mode: "lines",
      x: dates, y: closes,
      line: { color: isUp ? "#3fb950" : "#f85149", width: 1.5 },
      fill: "tozeroy",
      fillcolor: isUp ? "rgba(63,185,80,0.06)" : "rgba(248,81,73,0.06)",
    }], layout, { responsive: true, displayModeBar: false });
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtNum(n) {
  if (n == null) return "–";
  const abs = Math.abs(n);
  if (abs >= 1000) return n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (abs >= 10) return n.toFixed(2);
  if (abs >= 1) return n.toFixed(3);
  return n.toFixed(4);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
